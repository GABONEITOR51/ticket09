<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>805 MULTISERVICES</title>

<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        width: 80mm;
        margin: 0;
        padding: 0;
        font-size: 18px;
    }
    .ticket {
        background-color: #f9f9f9;
        padding: 12px;
        border: 2px solid #ccc;
        border-radius: 10px;
    }
    .ticket-header {
        text-align: center;
        margin-bottom: 20px;
    }
    .ticket-item {
        margin-bottom: 10px;
    }
    hr.separator {
        border: none;
        height: 1px;
        background-color: #ccc;
        margin: 12px 0;
    }

    /* Tabla alineada */
    .ticket-table {
        width: 100%;
        border-collapse: collapse;
        font-family: "Courier New", monospace;
        font-size: 16px;
    }
    .ticket-table th,
    .ticket-table td {
        padding: 2px 0;
    }
    .ticket-table th {
        border-bottom: 1px solid #ccc;
        text-align: left;
    }
    .ticket-table td {
        border-bottom: 1px dotted #ddd;
    }
    .num {
        text-align: right;
    }

    /* Total alineado */
    .total-line {
        font-family: "Courier New", monospace;
        font-size: 18px;
        text-align: right;
        margin-top: 10px;
    }
</style>
</head>

<body onload="window.print()" onfocus="window.close()">
    <div class="ticket">

        <div class="ticket-header">
            <h1>805 MULTISERVICES</h1>
        </div>

        <!-- Datos del ticket -->
        <div class="ticket-item"><strong>PRODUCTO:</strong> <span id="productName"></span></div>
        <div class="ticket-item"><strong>CLIENTE:</strong> <span id="customerName"></span></div>
        <div class="ticket-item"><strong>TELÉFONO:</strong> <span id="phoneNumber"></span></div>
     <hr class="separator">

        <!-- Tabla del carrito -->
        <div class="ticket-item"><strong>Movimientos:</strong></div>

        <table class="ticket-table">
            <thead>
                <tr>
                    <th style="width: 40%;">Producto</th>
                    <th style="width: 30%; text-align:right;">Entrada</th>
                    <th style="width: 30%; text-align:right;">Salida</th>
                </tr>
            </thead>
            <tbody id="productosBody"></tbody>
        </table>

        <!-- Total calculado -->
        <div class="total-line">
            Total: $<span id="totalCarrito"></span>
        </div>

        <hr class="separator">
  
        <div class="ticket-item"><strong>Pago en:</strong> <span id="paymentMethod"></span></div>
        <div class="ticket-item"><strong>Precio venta:</strong> $<span id="price"></span></div>
        <div class="ticket-item"><strong>Pago cliente:</strong> $<span id="customerPayment"></span></div>
        <div class="ticket-item"><strong>Cambio:</strong> $<span id="change"></span></div>

         <hr class="separator">

        <div class="ticket-item"><strong>Le atendió:</strong> <span id="executive"></span></div>
        <div class="ticket-item"><strong>Observación:</strong> <span id="Observacion"></span></div>
        <div class="ticket-item"><strong>Fecha:</strong> <span id="date"></span></div>

    </div>

<script>
document.addEventListener("DOMContentLoaded", function() {

    // 🔥 Función para quitar .00 si es entero
    function limpiarNumero(n) {
        if (!n || n === 0) return "";
        return Number(n) % 1 === 0 ? Number(n).toString() : Number(n).toFixed(2);
    }

    const urlParams = new URLSearchParams(window.location.search);

    const productName      = urlParams.get('producto');
    const customerName     = urlParams.get('cliente');
    const phoneNumber      = urlParams.get('telefono');
    const paymentMethod    = urlParams.get('formadepago');
    const priceParam       = urlParams.get('precio');
    const pagoClienteParam = urlParams.get('pagocliente');
    const cambioParam      = urlParams.get('cambio');
    const executive        = urlParams.get('leatendio');
    const observacion      = urlParams.get('observacion');
    const date             = urlParams.get('fecha');
    const productosJSON    = urlParams.get('productos');

    // Asignar valores simples
    document.getElementById('productName').textContent   = productName || '';
    document.getElementById('customerName').textContent  = customerName || '';
    document.getElementById('phoneNumber').textContent   = phoneNumber || '';
    document.getElementById('paymentMethod').textContent = paymentMethod || '';
    document.getElementById('executive').textContent     = executive || '';
    document.getElementById('Observacion').textContent   = observacion || '';
    document.getElementById('date').textContent          = date || '';

    if (priceParam) document.getElementById('price').textContent = limpiarNumero(priceParam);
    if (pagoClienteParam) document.getElementById('customerPayment').textContent = limpiarNumero(pagoClienteParam);
    if (cambioParam) document.getElementById('change').textContent = limpiarNumero(cambioParam);

    // Procesar JSON del carrito
    let totalCarrito = 0;

    if (productosJSON) {
        try {
            const productos = JSON.parse(productosJSON);
            const tbody = document.getElementById('productosBody');

            productos.forEach(item => {
                const tr = document.createElement('tr');

                const tdId = document.createElement('td');
                tdId.textContent = item.IDProducto || '';

                const entrada = Number(item.Entrada || 0);
                const salida  = Number(item.Salida  || 0);

                const tdEntrada = document.createElement('td');
                tdEntrada.className = 'num';
                tdEntrada.textContent = limpiarNumero(entrada);

                const tdSalida = document.createElement('td');
                tdSalida.className = 'num';
                tdSalida.textContent = limpiarNumero(salida);

                tr.appendChild(tdId);
                tr.appendChild(tdEntrada);
                tr.appendChild(tdSalida);
                tbody.appendChild(tr);

                totalCarrito += entrada;
                totalCarrito -= salida;
            });

        } catch (e) {
            console.error("Error al procesar productos:", e);
        }
    }

    document.getElementById('totalCarrito').textContent = limpiarNumero(totalCarrito);

});
</script>

</body>
</html>
